<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily Logistics Manager - Jobs, Crews & Equipment Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            /* DR Dark Theme */
            --cbm-bg: #111410;
            --cbm-card-bg: #1a1d17;
            --cbm-surface2: #222620;
            --cbm-border: #2e3329;
            --cbm-text: #e8ead4;
            --cbm-text-light: #7a7d6a;
            --cbm-text-lighter: #555849;

            /* Accent / action colors */
            --cbm-primary: #7eb83a;
            --cbm-primary-light: #9ed050;
            --cbm-secondary: #d97c1a;
            --cbm-secondary-light: #e8961e;
            --cbm-success: #3a8a5a;
            --cbm-success-light: #4da870;
            --cbm-danger: #cc4444;
            --cbm-danger-light: #d96060;
            --cbm-warning: #d97c1a;

            /* Resource type colors (desaturated for dark bg) */
            --cbm-crew: #d0507a;
            --cbm-crew-light: #e0708a;
            --cbm-truck: #c46940;
            --cbm-truck-light: #d47f56;
            --cbm-equipment: #6a9060;
            --cbm-equipment-light: #85aa78;
            --cbm-job: #2a86b8;
            --cbm-job-light: #3a9fd4;
            --cbm-vendor: #8a4eaa;
            --cbm-vendor-light: #a06cc0;

            /* Shadows — deeper for dark bg */
            --cbm-shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
            --cbm-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.5);
            --cbm-shadow-md: 0 4px 10px rgba(0,0,0,0.6), 0 2px 4px rgba(0,0,0,0.5);
            --cbm-shadow-lg: 0 8px 20px rgba(0,0,0,0.65), 0 4px 8px rgba(0,0,0,0.5);
            --cbm-shadow-xl: 0 16px 36px rgba(0,0,0,0.7), 0 8px 12px rgba(0,0,0,0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--cbm-bg);
            color: var(--cbm-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
        }

        .cbm-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Mobile Helper */
        .cbm-mobile-helper {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--cbm-primary);
            color: white;
            padding: 12px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--cbm-shadow-lg);
            z-index: 999;
            animation: slideUpFade 0.3s ease-out;
        }

        .cbm-mobile-helper.active {
            display: block;
        }

        .cbm-mobile-helper.selected {
            background: var(--cbm-success);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Sidebar */
        .cbm-sidebar {
            width: 360px;
            background: var(--cbm-bg);
            border-right: 1px solid var(--cbm-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--cbm-shadow);
        }

        .cbm-header {
            padding: 14px 20px;
            background: var(--cbm-card-bg);
            color: var(--cbm-text);
            border-bottom: 2px solid var(--cbm-primary);
            box-shadow: var(--cbm-shadow);
        }

        .cbm-header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 6px;
        }

        .cbm-header-icon {
            width: 42px;
            height: 42px;
            background: var(--cbm-surface2);
            border: 1px solid var(--cbm-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--cbm-primary);
        }

        .cbm-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--cbm-primary);
        }

        .cbm-header p {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            font-weight: 400;
            margin-left: 54px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--cbm-text-light);
        }

        /* Search & Filter Section */
        .cbm-search-section {
            padding: 16px 20px;
            background: var(--cbm-bg);
            border-bottom: 1px solid var(--cbm-border);
        }

        .cbm-search-box {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .cbm-search-box i.fa-search {
            position: absolute;
            left: 14px;
            color: var(--cbm-text-light);
            font-size: 14px;
        }

        .cbm-search-box input {
            width: 100%;
            padding: 10px 38px 10px 38px;
            border: 2px solid var(--cbm-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: var(--cbm-surface2);
            color: var(--cbm-text);
            transition: all 0.2s;
        }

        .cbm-search-box input:focus {
            outline: none;
            border-color: var(--cbm-primary);
            background: var(--cbm-surface2);
        }

        .cbm-clear-search {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            color: var(--cbm-text-lighter);
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .cbm-clear-search:hover {
            background: var(--cbm-border);
            color: var(--cbm-text);
        }

        .cbm-filter-select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--cbm-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: var(--cbm-surface2);
            color: var(--cbm-text);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .cbm-filter-select:focus {
            outline: none;
            border-color: var(--cbm-primary);
            background: var(--cbm-surface2);
        }

        /* Quick Info Panel */
        .cbm-quick-info {
            margin: 16px 20px;
            padding: 16px;
            background: var(--cbm-card-bg);
            border: 1px solid var(--cbm-border);
            border-radius: 12px;
            box-shadow: var(--cbm-shadow);
            color: var(--cbm-text);
        }

        .cbm-quick-info-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .cbm-quick-info-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cbm-quick-info-title span {
            font-size: 20px;
        }

        .cbm-quick-info-title strong {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--cbm-primary);
        }

        .cbm-close-info {
            background: var(--cbm-surface2);
            border: none;
            color: var(--cbm-text-light);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .cbm-close-info:hover {
            background: var(--cbm-border);
            color: var(--cbm-text);
        }

        .cbm-quick-info-body {
            margin-bottom: 12px;
            font-size: 13px;
            line-height: 1.6;
            color: var(--cbm-text-light);
        }

        .cbm-quick-info-body > div {
            margin-bottom: 6px;
        }

        .cbm-quick-info-actions {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--cbm-border);
        }

        .cbm-quick-info-actions .cbm-icon-btn {
            flex: 1;
            background: var(--cbm-surface2);
            border: none;
            color: var(--cbm-text-light);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .cbm-quick-info-actions .cbm-icon-btn:hover {
            background: var(--cbm-border);
            color: var(--cbm-text);
            transform: translateY(-1px);
        }

        .cbm-quick-info-actions .cbm-icon-btn.delete:hover {
            background: var(--cbm-danger);
            color: white;
        }

        .cbm-controls {
            padding: 20px;
            border-bottom: 1px solid var(--cbm-border);
            background: var(--cbm-bg);
        }

        .cbm-controls-section {
            margin-bottom: 16px;
        }

        .cbm-controls-section:last-child {
            margin-bottom: 0;
        }

        .cbm-controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            margin: -8px -12px 10px -12px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s;
            user-select: none;
        }

        .cbm-controls-header:hover {
            background: var(--cbm-surface2);
        }

        .cbm-controls-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--cbm-text-light);
            letter-spacing: 2px;
        }

        .cbm-toggle-icon {
            font-size: 12px;
            color: var(--cbm-text-lighter);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cbm-toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .cbm-controls-content {
            max-height: 500px;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 1;
        }

        .cbm-controls-content.collapsed {
            max-height: 0;
            opacity: 0;
        }

        .cbm-btn-group {
            display: flex;
            gap: 10px;
        }

        .cbm-btn {
            flex: 1;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
            box-shadow: var(--cbm-shadow-sm);
            letter-spacing: 0.02em;
            touch-action: manipulation;
            user-select: none;
        }

        .cbm-btn i {
            font-size: 14px;
        }

        .cbm-btn:active {
            transform: scale(0.98);
            box-shadow: var(--cbm-shadow-sm);
        }

        .cbm-btn-primary {
            background: var(--cbm-secondary);
            color: white;
        }

        .cbm-btn-success {
            background: var(--cbm-success);
            color: white;
        }

        .cbm-btn-danger {
            background: var(--cbm-danger);
            color: white;
        }

        .cbm-btn-crew {
            background: var(--cbm-crew);
            color: white;
        }

        .cbm-btn-truck {
            background: var(--cbm-truck);
            color: white;
        }

        .cbm-btn-equipment {
            background: var(--cbm-equipment);
            color: white;
        }

        .cbm-btn-job {
            background: var(--cbm-job);
            color: white;
        }

        .cbm-btn-vendor {
            background: var(--cbm-vendor);
            color: white;
        }

        .cbm-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .cbm-items-list h3 {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--cbm-text-light);
            margin-bottom: 12px;
            margin-top: 24px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cbm-items-list h3:first-child {
            margin-top: 0;
        }

        .cbm-items-list h3 i {
            font-size: 14px;
        }

        .cbm-item {
            background: var(--cbm-card-bg);
            padding: 14px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--cbm-border);
            touch-action: manipulation;
            user-select: none;
            min-height: 60px;
        }

        .cbm-item:hover {
            border-color: var(--cbm-primary);
            background: var(--cbm-surface2);
        }

        .cbm-item:active {
            transform: scale(0.98);
        }

        .cbm-item.selected {
            border: 2px solid var(--cbm-primary);
            box-shadow: 0 0 0 3px rgba(126, 184, 58, 0.2);
            transform: scale(1.02);
        }

        .cbm-item.crew {
            border-left-color: var(--cbm-crew);
        }

        .cbm-item.truck {
            border-left-color: var(--cbm-truck);
        }

        .cbm-item.equipment {
            border-left-color: var(--cbm-equipment);
        }

        .cbm-item.job {
            border-left-color: var(--cbm-job);
        }

        .cbm-item.vendor {
            border-left-color: var(--cbm-vendor);
        }

        .cbm-item-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .cbm-item.crew .cbm-item-icon {
            background: linear-gradient(135deg, var(--cbm-crew), var(--cbm-crew-light));
        }

        .cbm-item.truck .cbm-item-icon {
            background: linear-gradient(135deg, var(--cbm-truck), var(--cbm-truck-light));
        }

        .cbm-item.equipment .cbm-item-icon {
            background: linear-gradient(135deg, var(--cbm-equipment), var(--cbm-equipment-light));
        }

        .cbm-item.job .cbm-item-icon {
            background: linear-gradient(135deg, var(--cbm-job), var(--cbm-job-light));
        }

        .cbm-item.vendor .cbm-item-icon {
            background: linear-gradient(135deg, var(--cbm-vendor), var(--cbm-vendor-light));
        }

        .cbm-item-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .cbm-item-info {
            flex: 1;
        }

        .cbm-item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
            color: var(--cbm-text);
        }

        .cbm-item-details {
            font-size: 12px;
            color: var(--cbm-text-light);
            line-height: 1.4;
        }

        .cbm-item-actions {
            display: flex;
            gap: 6px;
        }

        .cbm-icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--cbm-surface2);
            color: var(--cbm-text-light);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            user-select: none;
        }

        .cbm-icon-btn:active {
            transform: scale(0.95);
            background: var(--cbm-secondary);
            color: white;
        }

        .cbm-icon-btn.delete:active {
            background: var(--cbm-danger);
        }

        /* Map Area */
        .cbm-map-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .cbm-map-toolbar {
            background: var(--cbm-card-bg);
            border-bottom: 2px solid var(--cbm-border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--cbm-shadow);
            flex-wrap: wrap;
            gap: 12px;
            z-index: 10;
        }

        .cbm-map-toolbar-left {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .cbm-map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--cbm-bg);
            -webkit-overflow-scrolling: touch;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Modal */
        .cbm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .cbm-modal.active {
            display: flex;
        }

        .cbm-modal-content {
            background: var(--cbm-card-bg);
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            max-height: 90vh;
            overflow: auto;
            box-shadow: var(--cbm-shadow-xl);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cbm-modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--cbm-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cbm-modal-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--cbm-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cbm-modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--cbm-surface2);
            font-size: 18px;
            cursor: pointer;
            color: var(--cbm-text-light);
            border-radius: 8px;
            transition: all 0.2s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cbm-modal-close:active {
            background: var(--cbm-danger);
            color: white;
        }

        .cbm-modal-body {
            padding: 24px;
        }

        .cbm-form-group {
            margin-bottom: 20px;
        }

        .cbm-form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--cbm-text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cbm-form-group label i {
            font-size: 12px;
            color: var(--cbm-text-light);
        }

        .cbm-form-group input,
        .cbm-form-group select,
        .cbm-form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--cbm-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--cbm-text);
            transition: all 0.2s;
            background: var(--cbm-surface2);
        }

        .cbm-form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        .cbm-form-group input:focus,
        .cbm-form-group select:focus,
        .cbm-form-group textarea:focus {
            outline: none;
            border-color: var(--cbm-primary);
            box-shadow: 0 0 0 3px rgba(126, 184, 58, 0.15);
        }

        .cbm-modal-footer {
            padding: 18px 24px;
            border-top: 1px solid var(--cbm-border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--cbm-surface2);
        }

        .cbm-btn-secondary {
            background: var(--cbm-surface2);
            color: var(--cbm-text-light);
            border: 1px solid var(--cbm-border);
        }

        /* Stats */
        .cbm-stats {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: var(--cbm-text-light);
            font-weight: 500;
        }

        .cbm-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cbm-stat i {
            font-size: 14px;
        }

        .cbm-stat.crew i { color: var(--cbm-crew); }
        .cbm-stat.truck i { color: var(--cbm-truck); }
        .cbm-stat.equipment i { color: var(--cbm-equipment); }

        /* Responsive */
        @media (max-width: 768px) {
            .cbm-container {
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            .cbm-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--cbm-border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                min-height: 0;
            }

            .cbm-map-area {
                flex: 1;

<body>

                    </button>

    <script>
        (function(window) {
            'use strict';

            // Private state
            let items = {
                job: [],
                vendor: [],
                crew: [],
                truck: [],
                equipment: []
            };

            let map = null;
            let markers = {};
            let editingItemId = null;
            let selectedItem = null;
            let searchQuery = '';
            let currentFilter = 'all';
            let selectedItemInfo = null;
            let collapsedSections = {
                addResources: false,
                dataManagement: false,
                closestCrew: true
            };
            const STORAGE_KEY = 'dailyLogisticsData';
            const COLLAPSED_KEY = 'dailyLogisticsCollapsed';

            // Default location: Gainesville, GA
            const DEFAULT_CENTER = [34.2979, -83.8241];
            const DEFAULT_ZOOM = 11;

            // Icons for different types
            const ICONS = {
                job: '<i class="fas fa-briefcase"></i>',
                vendor: '<i class="fas fa-store"></i>',
                crew: '<i class="fas fa-users"></i>',
                truck: '<i class="fas fa-truck"></i>',
                equipment: '<i class="fas fa-tools"></i>'
            };

            // Marker colors
            const MARKER_COLORS = {
                job: '#4A90E2',
                vendor: '#9B59B6',
                crew: '#FF6B9D',
                truck: '#D97652',
                equipment: '#7A9B76'
            };

            // Mobile detection
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
                            (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);

            // Main module
            const CrewBattleMap = {
                init: function() {
                    this.loadState();
                    this.initializeVendors(); // Pre-populate vendors if first time
                    this.applyCollapsedState();
                    this.initMap();
                    this.render();

                    if (isMobile) {
                        setTimeout(() => {
                            const helper = document.getElementById('mobileHelper');
                            helper.classList.add('active');
                            setTimeout(() => {
                                helper.classList.remove('active');
                            }, 4000);
                        }, 1000);
                    }
                },

                initMap: function() {
                    // Initialize Leaflet map with a slight delay to ensure container is ready
                    setTimeout(() => {
                        try {
                            // Initialize Leaflet map
                            map = L.map('map').setView(DEFAULT_CENTER, DEFAULT_ZOOM);

                            // Add OpenStreetMap tiles
                            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                                attribution: '© OpenStreetMap contributors',
                                maxZoom: 19
                            }).addTo(map);

                            // Fix map size after initialization
                            setTimeout(() => {
                                map.invalidateSize();
                                this.renderMap(); // Render vendors on map
                            }, 100);

                            // Add click handler to add items to map
                            map.on('click', (e) => {
                                if (selectedItem) {
                                    this.addItemToMap(selectedItem.type, selectedItem.id, e.latlng);
                                    selectedItem = null;
                                    this.updateMobileHelper(false);
                                    this.render();
                                }
                            });
                        } catch (error) {
                            console.error('Error initializing map:', error);
                            alert('Error loading map. Please refresh the page.');
                        }
                    }, 100);
                },

                initializeVendors: function() {
                    // Pre-populate vendors on first run
                    if (items.vendor.length === 0) {
                        const defaultVendors = [
                            // SiteOne Locations

                            { name: 'SiteOne – Suwanee (Irrigation)', address: '3550 Lawrenceville-Suwanee Rd, Suwanee, GA 30024', category: 'supplier' },
                            { name: 'SiteOne – Alpharetta', address: '630 Union Hill Rd, Alpharetta, GA 30004', category: 'supplier' },
                            { name: 'SiteOne Stone Center – Cumming (Alliance Stone #1012)', address: '5420 Campground Rd, Cumming, GA 30040', category: 'supplier', notes: 'Stone Center / Alliance Stone yard' },
                            { name: 'SiteOne Stone Center – Cumming (SLS #1045)', address: '2235 Pendley Rd, Cumming, GA 30041', category: 'supplier', notes: 'Former Southern Landscape Supply location' },

                            // Stovall Locations
                            { name: 'Stovall & Company – Braselton', address: '2695 Old Winder Hwy, Braselton, GA 30517', category: 'supplier' },
                            { name: 'Stovall & Company – Hoschton', address: '6077 Hwy 53, Hoschton, GA 30548', category: 'supplier' },
                            { name: 'Stovall & Company – Alpharetta', address: '5285 McGinnis Ferry Rd, Alpharetta, GA 30005', category: 'supplier' },
                            { name: 'Stovall Stone Yard – Doraville', address: '6665 Buford Hwy NE, Doraville, GA 30340', category: 'supplier' },
                            { name: 'Stovall & Company – Athens', address: '1708 S Milledge Ave, Athens, GA 30605', category: 'supplier' },

                            // Other Suppliers
                            { name: 'Stone Center (Outdoor Living Supply) – Cumming', address: '4675-B Canton Hwy, Cumming, GA 30040', category: 'supplier' },
                            { name: 'Southern Landscape Supply – Cumming', address: '2235 Pendley Rd, Cumming, GA 30041', category: 'supplier' },
                            { name: 'GLM Landscape Supply – Alpharetta/Milton', address: '13975 Hwy 9, Alpharetta, GA 30004', category: 'supplier' },

                            // Nurseries
                            { name: 'Buck Jones Nursery – Lawrenceville', address: '689 Grayson New Hope Rd, Lawrenceville, GA 30045', category: 'nursery' },
                            { name: 'Woody\'s Nursery (Wholesale) – Duluth', address: '2886 N Buford Hwy, Duluth, GA 30096', category: 'nursery' },
                            { name: 'Kinsey Family Farm – Gainesville', address: '7170 Jot-em Down Rd, Gainesville, GA 30506', category: 'nursery', notes: 'Farm sometimes lists 7140 for directions; 7170 works best for GPS' },
                            { name: 'Full Bloom Nursery – Clermont', address: '6662 Holly Springs Rd, Clermont, GA 30527', category: 'nursery' },
                            { name: 'Lanier Nursery & Gardens – Flowery Branch', address: '4195 Schubert Rd, Flowery Branch, GA 30502', category: 'nursery' },

                            // Sod & Turf
                            { name: 'Super-Sod of Gwinnett – Lawrenceville', address: '111 Hurricane Shoals Rd NW, Lawrenceville, GA 30046', category: 'sod_turf' },
                            { name: 'Southeastern Sod – Sugar Hill', address: '1400 Buford Hwy, Ste G6, Sugar Hill, GA 30518', category: 'sod_turf' },
                            { name: 'NG Turf – Clarkesville Farm', address: '1805 Hardman Rd, Clarkesville, GA 30523', category: 'sod_turf', notes: 'Closest NG Turf farm to Gainesville' },

                            // Retail Garden Centers
                            { name: 'Pike Nurseries – Suwanee', address: '1105 Peachtree Industrial Blvd, Suwanee, GA 30024', category: 'retail_garden_center' },
                            { name: 'Pike Nurseries – Milton/Crabapple', address: '12325 Crabapple Rd, Alpharetta, GA 30004', category: 'retail_garden_center' },
                            { name: 'Pike Nurseries – Cumming', address: '6050 Bethelview Rd, Cumming, GA 30040', category: 'retail_garden_center' },
                            { name: 'Northside Garden Center – Sugar Hill/Buford', address: '950 Peachtree Industrial Blvd, Buford, GA 30518', category: 'retail_garden_center' }
                        ];

                        // Track geocoding results
                        const geocodeResults = [];
                        let processedCount = 0;

                        console.log('%c🗺️ Starting vendor geocoding...', 'color: #4A90E2; font-weight: bold; font-size: 14px;');

                        defaultVendors.forEach((vendor, index) => {
                            const id = 'vendor_' + Date.now() + '_' + Math.random();
                            items.vendor.push({
                                id: id,
                                name: vendor.name,
                                address: vendor.address,
                                category: vendor.category,
                                details: vendor.notes || '',
                                phone: '',
                                lat: null,
                                lng: null
                            });

                            // Geocode with delay to respect rate limits (1 req/sec for Nominatim)
                            setTimeout(() => {
                                this.geocodeAddress(
                                    vendor.address,
                                    (lat, lng) => {
                                        const item = items.vendor.find(v => v.id === id);
                                        if (item) {
                                            item.lat = lat;
                                            item.lng = lng;
                                            this.saveState();
                                            this.renderMap();
                                        }
                                        geocodeResults.push({ name: vendor.name, address: vendor.address, status: '✓ Success', lat: lat.toFixed(4), lng: lng.toFixed(4) });
                                        processedCount++;
                                        this.checkGeocodingComplete(processedCount, defaultVendors.length, geocodeResults);
                                    },
                                    (error) => {
                                        geocodeResults.push({ name: vendor.name, address: vendor.address, status: '✗ FAILED', lat: '-', lng: '-' });
                                        processedCount++;
                                        this.checkGeocodingComplete(processedCount, defaultVendors.length, geocodeResults);
                                    }
                                );
                            }, index * 1500); // 1.5 second delay between each request
                        });

                        this.saveState();
                    }
                },

                checkGeocodingComplete: function(processed, total, results) {
                    if (processed === total) {
                        console.log(`\n%c📍 Geocoding Complete: ${processed}/${total} vendors processed`, 'color: #10b981; font-weight: bold; font-size: 14px;');
                        console.table(results);

                        const failed = results.filter(r => r.status.includes('FAILED'));
                        if (failed.length > 0) {
                            console.log(`\n%c⚠️ ${failed.length} address(es) failed to geocode:`, 'color: #ef4444; font-weight: bold;');
                            failed.forEach(f => console.log(`   • ${f.name}: ${f.address}`));
                        } else {
                            console.log('%c✓ All vendor addresses geocoded successfully!', 'color: #10b981; font-weight: bold;');
                        }
                    }
                },

                geocodeAddress: function(address, callback, errorCallback) {
                    const doFetch = (url) =>
                        fetch(url, { headers: { 'User-Agent': 'DailyLogisticsManager/1.0' } })
                            .then(r => r.json());

                    const zipMatch = address.match(/\b(\d{5})\b/);

                    if (zipMatch) {
                        // Strategy 1: structured search — immune to comma/formatting issues
                        // Extract street by matching up to the last street-type word
                        const streetMatch = address.match(/^(.*?\b(?:rd|dr|st|ave|blvd|ln|way|ct|pl|cir|hwy|pkwy|trl|ter|trce|trace|pass|run|row|xing|crossing)\b\.?)/i);
                        const street = (streetMatch ? streetMatch[1] : address.split(/[,\s]{2,}/)[0]).trim();
                        const zip = zipMatch[1];

                        const structuredUrl = `https://nominatim.openstreetmap.org/search?format=json&street=${encodeURIComponent(street)}&postalcode=${zip}&countrycodes=us`;

                        doFetch(structuredUrl)
                            .then(data => {
                                if (data && data.length > 0) {
                                    console.log(`✓ Geocoded: ${address}`);
                                    callback(parseFloat(data[0].lat), parseFloat(data[0].lon));
                                } else {
                                    // Strategy 2: Google Maps fallback — better rural road coverage
                                    const mapsUrl = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${this.GOOGLE_MAPS_API_KEY}`;
                                    setTimeout(() => {
                                        doFetch(mapsUrl)
                                            .then(data2 => {
                                                if (data2 && data2.status === 'OK' && data2.results.length > 0) {
                                                    const loc = data2.results[0].geometry.location;
                                                    console.log(`✓ Geocoded via Google Maps: ${address}`);
                                                    callback(loc.lat, loc.lng);
                                                } else {
                                                    // Strategy 3: zip-only pin via Google Maps
                                                    const zipOnlyUrl = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(zip + ', USA')}&key=${this.GOOGLE_MAPS_API_KEY}`;
                                                    setTimeout(() => {
                                                        doFetch(zipOnlyUrl)
                                                            .then(data3 => {
                                                                if (data3 && data3.status === 'OK' && data3.results.length > 0) {
                                                                    const loc = data3.results[0].geometry.location;
                                                                    console.log(`📍 Approximate pin (zip ${zip}): ${address}`);
                                                                    callback(loc.lat, loc.lng);
                                                                } else {
                                                                    console.warn(`✗ Could not geocode: ${address} (tried Nominatim + Google Maps + zip fallback)`);
                                                                    if (errorCallback) errorCallback(`Could not find location for: ${address}`);
                                                                }
                                                            })
                                                            .catch(() => { if (errorCallback) errorCallback('Network error while geocoding'); });
                                                    }, 2000);
                                                }
                                            })
                                            .catch(() => { if (errorCallback) errorCallback('Network error while geocoding'); });
                                    }, 2000);
                                }
                            })
                            .catch(error => {
                                console.error('Geocoding error for', address, ':', error);
                                if (errorCallback) errorCallback('Network error while geocoding');
                            });
                        return;
                    }

                    // No zip code — free-text search with state/country appended
                    let query = address
                        .replace(/\b(suite|ste|apt|unit|#)\s*[\w-]+,?\s*/gi, ' ')
                        .replace(/\s{2,}/g, ' ')
                        .trim()
                        .replace(/,\s*$/, '');

                    if (!/\b(GA|AL|FL|TN|SC|NC|Georgia)\b/i.test(query)) {
                        query += ', GA, USA';
                    } else if (!/\bUSA\b/i.test(query)) {
                        query += ', USA';
                    }

                    doFetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=us`)
                        .then(data => {
                            if (data && data.length > 0) {
                                console.log(`✓ Geocoded: ${address}`);
                                callback(parseFloat(data[0].lat), parseFloat(data[0].lon));
                            } else {
                                // Fallback to Google Maps
                                const mapsUrl = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${this.GOOGLE_MAPS_API_KEY}`;
                                setTimeout(() => {
                                    doFetch(mapsUrl)
                                        .then(data2 => {
                                            if (data2 && data2.status === 'OK' && data2.results.length > 0) {
                                                const loc = data2.results[0].geometry.location;
                                                console.log(`✓ Geocoded via Google Maps: ${address}`);
                                                callback(loc.lat, loc.lng);
                                            } else {
                                                console.warn(`✗ Could not geocode: ${address} (tried Nominatim + Google Maps)`);
                                                if (errorCallback) errorCallback(`Could not find location for: ${address}`);
                                            }
                                        })
                                        .catch(error => {
                                            console.error('Geocoding error for', address, ':', error);
                                            if (errorCallback) errorCallback('Network error while geocoding');
                                        });
                                }, 2000);
                            }
                        })
                        .catch(error => {
                            console.error('Geocoding error for', address, ':', error);
                            if (errorCallback) errorCallback('Network error while geocoding');
                        });
                },

                loadState: function() {
                    try {
                        const saved = localStorage.getItem(STORAGE_KEY);
                        if (saved) {
                            const data = JSON.parse(saved);
                            items = data.items || items;
                        }

                        const savedCollapsed = localStorage.getItem(COLLAPSED_KEY);
                        if (savedCollapsed) {
                            collapsedSections = JSON.parse(savedCollapsed);
                        }
                    } catch (e) {
                        console.error('Error loading state:', e);
                        alert('Saved data was corrupted and could not be loaded. Starting fresh.');
                        localStorage.removeItem(STORAGE_KEY);
                    }
                },

                saveState: function() {
                    try {
                        const data = {
                            items: items
                        };
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    } catch (e) {
                        console.error('Error saving state:', e);
                        alert('Error saving data. Your browser storage may be full.');
                    }
                },

                render: function() {
                    this.renderItemsList();
                    this.renderMap();
                    this.updateStats();
                    this.updateQuickInfo();
                },

                renderItemsList: function() {
                    ['job', 'vendor', 'crew', 'truck', 'equipment'].forEach(type => {
                        const container = document.getElementById(type + 'List');
                        const countEl = document.getElementById(type + 'Count');

                        // Filter items based on current filter and search query
                        let filteredItems = items[type];

                        // Apply type filter
                        if (currentFilter !== 'all' && currentFilter !== type) {
                            filteredItems = [];
                        }

                        // Apply search filter
                        if (searchQuery) {
                            const query = searchQuery.toLowerCase();
                            filteredItems = filteredItems.filter(item =>
                                item.name.toLowerCase().includes(query) ||
                                (item.details && item.details.toLowerCase().includes(query))
                            );
                        }

                        container.innerHTML = filteredItems.map(item => {
                            const isSelected = selectedItemInfo && selectedItemInfo.id === item.id && selectedItemInfo.type === type;
                            const attrId = this.escapeAttr(item.id);
                            const jsId = this.escapeJsStr(item.id);
                            return `
                                <div class="cbm-item ${type} ${isSelected ? 'selected' : ''}"
                                     data-id="${attrId}"
                                     data-type="${type}"
                                     draggable="true"
                                     onclick="CrewBattleMap.selectItem('${type}', '${jsId}', event)">
                                    <div class="cbm-item-content">
                                        <div class="cbm-item-icon">${ICONS[type]}</div>
                                        <div class="cbm-item-info">
                                            <div class="cbm-item-name">${this.escapeHtml(item.name)}</div>
                                            ${item.details ? `<div class="cbm-item-details">${this.escapeHtml(item.details)}</div>` : ''}
                                        </div>
                                    </div>
                                    <div class="cbm-item-actions">
                                        <button class="cbm-icon-btn" onclick="event.stopPropagation(); CrewBattleMap.editItem('${type}', '${jsId}')" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="cbm-icon-btn delete" onclick="event.stopPropagation(); CrewBattleMap.deleteItem('${type}', '${jsId}')" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('');

                        countEl.textContent = filteredItems.length;
                    });
                },

                renderMap: function() {
                    if (!map) return;

                    // Clear existing markers
                    Object.values(markers).forEach(marker => map.removeLayer(marker));
                    markers = {};

                    // Add markers for all items with locations
                    ['job', 'vendor'].forEach(type => {
                        items[type].forEach(item => {
                            if (item.lat && item.lng) {
                                this.addMarker(item, type);
                            }
                        });
                    });
                },

                addMarker: function(item, type) {
                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `
                            <div style="
                                background: ${MARKER_COLORS[type]};
                                width: 32px;
                                height: 32px;
                                border-radius: 50% 50% 50% 0;
                                transform: rotate(-45deg);
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                border: 3px solid white;
                                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                            ">
                                <div style="transform: rotate(45deg); color: white; font-size: 14px;">
                                    ${ICONS[type]}
                                </div>
                            </div>
                        `,
                        iconSize: [32, 32],
                        iconAnchor: [16, 32]
                    });

                    const marker = L.marker([item.lat, item.lng], { icon: icon })
                        .addTo(map)
                        .bindPopup(this.createPopupContent(item, type));

                    marker.on('click', () => {
                        this.selectItem(type, item.id, null);
                    });

                    markers[item.id] = marker;
                },

                createPopupContent: function(item, type) {
                    let content = `<div style="min-width: 200px;">`;
                    content += `<strong style="font-size: 16px;">${this.escapeHtml(item.name)}</strong><br>`;

                    if (type === 'job') {
                        if (item.status) {
                            const statusLabels = {
                                'scheduled': 'Scheduled',
                                'in_progress': 'In Progress',
                                'completed': 'Completed'
                            };
                            content += `<div style="margin-top: 8px;"><strong>Status:</strong> ${statusLabels[item.status] || item.status}</div>`;
                        }
                        if (item.date) {
                            content += `<div><strong>Date:</strong> ${new Date(item.date).toLocaleString()}</div>`;
                        }
                        if (item.address) {
                            content += `<div><strong>Address:</strong> ${this.escapeHtml(item.address)}</div>`;
                        }
                        if (item.assignedCrews && item.assignedCrews.length > 0) {
                            content += `<div><strong>Assigned Crews:</strong> ${item.assignedCrews.length}</div>`;
                        }
                    } else if (type === 'vendor') {
                        if (item.category) {
                            const categoryLabels = {
                                'supplier': 'Supplier (Landscape/Hardscape)',
                                'nursery': 'Nursery (Plants/Trees)',
                                'sod_turf': 'Sod & Turf',
                                'retail_garden_center': 'Retail Garden Center',
                                'equipment_rental': 'Equipment Rental',
                                'other': 'Other'
                            };
                            content += `<div style="margin-top: 8px;"><strong>Category:</strong> ${categoryLabels[item.category] || item.category}</div>`;
                        }
                        if (item.phone) {
                            content += `<div><strong>Phone:</strong> ${this.escapeHtml(item.phone)}</div>`;
                        }
                        if (item.address) {
                            content += `<div><strong>Address:</strong> ${this.escapeHtml(item.address)}</div>`;
                        }
                    }

                    if (item.details) {
                        content += `<div style="margin-top: 8px; font-style: italic;">${this.escapeHtml(item.details)}</div>`;
                    }

                    content += `</div>`;
                    return content;
                },

                addItemToMap: function(type, itemId, latlng) {
                    const item = items[type].find(i => i.id === itemId);
                    if (!item) return;

                    // Only jobs and vendors get placed on map
                    if (type !== 'job' && type !== 'vendor') {
                        alert('Only jobs and vendors can be placed on the map. Crews, trucks, and equipment are assigned to jobs.');
                        return;
                    }

                    item.lat = latlng.lat;
                    item.lng = latlng.lng;

                    this.saveState();
                    this.renderMap();
                },

                updateMobileHelper: function(selected) {
                    if (!isMobile) return;

                    const helper = document.getElementById('mobileHelper');
                    if (selected) {
                        helper.innerHTML = '<i class="fas fa-hand-pointer"></i> Tap the map to place item';
                        helper.classList.add('active', 'selected');
                    } else {
                        helper.innerHTML = '<i class="fas fa-hand-pointer"></i> Tap an item, then tap the map to place';
                        helper.classList.remove('selected');
                    }
                },


                openAddModal: function(type) {
                    const typeMap = {
                        job: { icon: 'briefcase', label: 'Job' },
                        vendor: { icon: 'store', label: 'Vendor' },
                        crew: { icon: 'users', label: 'Crew' },
                        truck: { icon: 'truck', label: 'Truck' },
                        equipment: { icon: 'tools', label: 'Equipment' }
                    };

                    editingItemId = null;
                    document.getElementById('modalTitle').innerHTML = `<i class="fas fa-plus-circle"></i> Add ${typeMap[type].label}`;
                    document.getElementById('itemType').value = type;
                    document.getElementById('itemId').value = '';
                    document.getElementById('itemName').value = '';
                    document.getElementById('itemDetails').value = '';

                    // Hide/show type-specific fields
                    this.toggleModalFields(type);

                    // Clear type-specific fields
                    if (type === 'job') {

                        document.getElementById('jobDate').value = '';
