                    } else if (type === 'vendor') {
                        document.getElementById('vendorAddress').value = '';
                        document.getElementById('vendorPhone').value = '';
                        document.getElementById('vendorCategory').value = '';
                    }

                    document.getElementById('itemModal').classList.add('active');
                    document.getElementById('itemName').focus();
                },

                editItem: function(type, id) {
                    const item = items[type].find(i => i.id === id);
                    if (!item) return;

                    const typeMap = {
                        job: 'Job',
                        vendor: 'Vendor',
                        crew: 'Crew',
                        truck: 'Truck',
                        equipment: 'Equipment'
                    };

                    editingItemId = id;
                    document.getElementById('modalTitle').innerHTML = `<i class="fas fa-edit"></i> Edit ${typeMap[type]}`;
                    document.getElementById('itemType').value = type;
                    document.getElementById('itemId').value = id;
                    document.getElementById('itemName').value = item.name;
                    document.getElementById('itemDetails').value = item.details || '';

                    // Hide/show type-specific fields
                    this.toggleModalFields(type);

                    // Populate type-specific fields
                    if (type === 'job') {
                        document.getElementById('jobAddress').value = item.address || '';
                        document.getElementById('jobDate').value = item.date || '';
                        document.getElementById('jobStatus').value = item.status || 'scheduled';
                    } else if (type === 'vendor') {
                        document.getElementById('vendorAddress').value = item.address || '';
                        document.getElementById('vendorPhone').value = item.phone || '';
                        document.getElementById('vendorCategory').value = item.category || '';
                    }

                    document.getElementById('itemModal').classList.add('active');
                    document.getElementById('itemName').focus();
                },

                toggleModalFields: function(type) {
                    // Hide all type-specific fields
                    document.getElementById('jobAddressField').style.display = 'none';
                    document.getElementById('jobDateField').style.display = 'none';
                    document.getElementById('jobStatusField').style.display = 'none';
                    document.getElementById('vendorAddressField').style.display = 'none';
                    document.getElementById('vendorPhoneField').style.display = 'none';
                    document.getElementById('vendorCategoryField').style.display = 'none';

                    // Show relevant fields
                    if (type === 'job') {
                        document.getElementById('jobAddressField').style.display = 'block';
                        document.getElementById('jobDateField').style.display = 'block';
                        document.getElementById('jobStatusField').style.display = 'block';
                    } else if (type === 'vendor') {
                        document.getElementById('vendorAddressField').style.display = 'block';
                        document.getElementById('vendorPhoneField').style.display = 'block';
                        document.getElementById('vendorCategoryField').style.display = 'block';
                    }
                },

                deleteItem: function(type, id) {
                    if (!confirm('Delete this item? It will also be removed from the map.')) return;

                    items[type] = items[type].filter(i => i.id !== id);

                    // Remove marker if it exists
                    if (markers[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }

                    // Clear selection if deleted item was selected
                    if (selectedItemInfo && selectedItemInfo.type === type && selectedItemInfo.id === id) {
                        this.clearSelection();
                    }

                    this.saveState();
                    this.render();
                },

                // Search and filter methods
                handleSearch: function() {
                    const input = document.getElementById('searchInput');
                    const clearBtn = document.getElementById('clearSearch');
                    searchQuery = input.value.trim();

                    // Show/hide clear button
                    clearBtn.style.display = searchQuery ? 'block' : 'none';

                    this.render();
                },

                clearSearch: function() {
                    document.getElementById('searchInput').value = '';
                    searchQuery = '';
                    document.getElementById('clearSearch').style.display = 'none';
                    this.render();
                },

                handleFilter: function() {
                    currentFilter = document.getElementById('filterType').value;
                    this.render();
                },

                // Collapsible sections
                toggleSection: function(sectionName) {
                    collapsedSections[sectionName] = !collapsedSections[sectionName];

                    const content = document.getElementById(sectionName + 'Content');
                    const icon = document.getElementById(sectionName + 'Icon');

                    if (collapsedSections[sectionName]) {
                        content.classList.add('collapsed');
                        icon.classList.add('collapsed');
                    } else {
                        content.classList.remove('collapsed');
                        icon.classList.remove('collapsed');
                    }

                    // Save state
                    try {
                        localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsedSections));
                    } catch (e) {
                        console.error('Error saving collapsed state:', e);
                    }
                },

                applyCollapsedState: function() {
                    Object.keys(collapsedSections).forEach(sectionName => {
                        if (collapsedSections[sectionName]) {
                            const content = document.getElementById(sectionName + 'Content');
                            const icon = document.getElementById(sectionName + 'Icon');
                            if (content) content.classList.add('collapsed');
                            if (icon) icon.classList.add('collapsed');
                        }
                    });
                },

                editSelectedItem: function() {
                    if (!selectedItemInfo) return;
                    this.editItem(selectedItemInfo.type, selectedItemInfo.id);
                },

                deleteSelectedItem: function() {
                    if (!selectedItemInfo) return;
                    this.deleteItem(selectedItemInfo.type, selectedItemInfo.id);
                },

                panToSelected: function() {
                    if (!selectedItemInfo) return;
                    const { type, id, item } = selectedItemInfo;

                    if ((type === 'job' || type === 'vendor') && item.lat && item.lng) {
                        map.setView([item.lat, item.lng], 15);
                        if (markers[id]) {
                            markers[id].openPopup();
                        }
                    } else {
                        alert('This item is not placed on the map yet.');
                    }
                },

                closeModal: function() {
                    document.getElementById('itemModal').classList.remove('active');
                    document.getElementById('itemForm').reset();
                },

                handleFormSubmit: function(e) {
                    e.preventDefault();

                    const type = document.getElementById('itemType').value;
                    const id = document.getElementById('itemId').value || 'item_' + Date.now() + '_' + Math.random();
                    const name = document.getElementById('itemName').value.trim();
                    const details = document.getElementById('itemDetails').value.trim();

                    if (!name) {
                        alert('Name is required');
                        return;
                    }

                    // Get type-specific fields
                    let address = '';
                    let needsGeocoding = false;

                    if (type === 'job') {
                        address = document.getElementById('jobAddress').value.trim();
                        if (!address) {
                            alert('Address is required for jobs');
                            return;
                        }
                        needsGeocoding = true;
                    } else if (type === 'vendor') {
                        address = document.getElementById('vendorAddress').value.trim();
                        if (!address) {
                            alert('Address is required for vendors');
                            return;
                        }
                        needsGeocoding = true;
                    }

                    // Check for duplicate names
                    if (!editingItemId) {
                        const duplicateExists = items[type].some(item =>
                            item.name.toLowerCase() === name.toLowerCase()
                        );

                        if (duplicateExists) {
                            const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
                            alert(`A ${typeLabel} with the name "${name}" already exists. Please use a unique name.`);
                            return;
                        }
                    } else {
                        // Check for duplicate names when editing (exclude current item)
                        const duplicateExists = items[type].some(item =>
                            item.id !== id && item.name.toLowerCase() === name.toLowerCase()
                        );

                        if (duplicateExists) {
                            const typeLabel = type.charAt(0).toUpperCase() + type.slice(1);
                            alert(`Another ${typeLabel} already has the name "${name}". Please use a unique name.`);
                            return;
                        }
                    }

                    // Prevent double-click duplicate submissions (after all validation passes)
                    const submitBtn = document.querySelector('#itemForm button[type="submit"]');
                    if (submitBtn.disabled) return;
                    submitBtn.disabled = true;
                    setTimeout(() => { submitBtn.disabled = false; }, 500);

                    if (editingItemId) {
                        const item = items[type].find(i => i.id === id);
                        if (item) {
                            item.name = name;
                            item.details = details;

                            // Update type-specific fields
                            if (type === 'job') {
                                const oldAddress = item.address;
                                item.address = address;
                                item.date = document.getElementById('jobDate').value;
                                item.status = document.getElementById('jobStatus').value;
                                item.assignedCrews = item.assignedCrews || [];
                                item.assignedTrucks = item.assignedTrucks || [];

                                // Geocode if address changed
                                if (address !== oldAddress) {
                                    this.geocodeAddress(address, (lat, lng) => {
                                        item.lat = lat;
                                        item.lng = lng;
                                        this.saveState();
                                        this.renderMap();
                                    });
                                }
                            } else if (type === 'vendor') {
                                const oldAddress = item.address;
                                item.address = address;
                                item.phone = document.getElementById('vendorPhone').value.trim();
                                item.category = document.getElementById('vendorCategory').value;

                                // Geocode if address changed
                                if (address !== oldAddress) {
                                    this.geocodeAddress(address, (lat, lng) => {
                                        item.lat = lat;
                                        item.lng = lng;
                                        this.saveState();
                                        this.renderMap();
                                    });
                                }
                            }
                        }
                    } else {
                        const newItem = {
                            id: id,
                            name: name,
                            details: details
                        };

                        // Add type-specific fields
                        if (type === 'job') {
                            newItem.address = address;
                            newItem.date = document.getElementById('jobDate').value;
                            newItem.status = document.getElementById('jobStatus').value;
                            newItem.assignedCrews = [];
                            newItem.assignedTrucks = [];
                            newItem.lat = null;
                            newItem.lng = null;
                        } else if (type === 'vendor') {
                            newItem.address = address;
                            newItem.phone = document.getElementById('vendorPhone').value.trim();
                            newItem.category = document.getElementById('vendorCategory').value;
                            newItem.lat = null;
                            newItem.lng = null;
                        }

                        items[type].push(newItem);

                        // Geocode the address if needed
                        if (needsGeocoding && address) {
                            this.geocodeAddress(address, (lat, lng) => {
                                newItem.lat = lat;
                                newItem.lng = lng;
                                this.saveState();
                                this.renderMap();
                            });
                        }
                    }

                    this.saveState();
                    this.render();
                    this.closeModal();
                },

                // Google Sheets sync configuration
                GOOGLE_SHEET_ID: '13bnntgZiXdCA2KQvJXpIBA1rCBzx3ZmeKakzYFFg7QA',
                GOOGLE_SHEET_GID: '149833501', // WorkOrders tab
                GOOGLE_MAPS_API_KEY: 'AIzaSyA9mJz1wSY6GBalGuiEGzE2aLPv0x7qelQ',

                syncFromGoogleSheet: async function() {
                    const sheetUrl = `https://docs.google.com/spreadsheets/d/${this.GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv&gid=${this.GOOGLE_SHEET_GID}`;

                    console.log('%c📊 Syncing jobs from Google Sheet...', 'color: #4A90E2; font-weight: bold; font-size: 14px;');

                    try {
                        const response = await fetch(sheetUrl);
                        if (!response.ok) {
                            throw new Error('Failed to fetch sheet. Make sure the sheet is shared publicly or published to the web.');
                        }

                        const csvText = await response.text();
                        const rows = this.parseCSV(csvText);

                        if (rows.length < 2) {
                            alert('No data found in the sheet.');
                            return;
                        }

                        // Find column indices (header row is first)
                        const headers = rows[0].map(h => h.toLowerCase().trim());
                        const customerNameIdx = headers.findIndex(h => h.includes('customer') && h.includes('name'));
                        const jobAddressIdx = headers.findIndex(h => h.includes('job') && h.includes('address'));

                        if (customerNameIdx === -1 || jobAddressIdx === -1) {
                            alert('Could not find "Customer Name" or "Job Address" columns in the sheet.');
                            console.error('Headers found:', headers);
                            return;
                        }

                        // Build a map of active jobs from the sheet: lowercase name -> { name, address }
                        const sheetJobs = new Map();
                        for (let i = 1; i < rows.length; i++) {
                            const row = rows[i];
                            const customerName = (row[customerNameIdx] || '').trim();
                            const jobAddress = (row[jobAddressIdx] || '').trim();
                            if (customerName && jobAddress) {
                                sheetJobs.set(customerName.toLowerCase(), { name: customerName, address: jobAddress });
                            }
                        }

                        // Remove jobs no longer in the sheet
                        const beforeCount = items.job.length;
                        items.job = items.job.filter(j => sheetJobs.has(j.name.toLowerCase()));
                        const removedCount = beforeCount - items.job.length;
                        if (removedCount > 0) {
                            console.log(`%c🗑️ Removed ${removedCount} job(s) no longer in sheet`, 'color: #ef4444; font-weight: bold;');
                        }

                        // Update addresses for existing jobs; clear coords if address changed so they re-geocode
                        items.job.forEach(job => {
                            const sheetData = sheetJobs.get(job.name.toLowerCase());
                            if (sheetData && sheetData.address !== job.address) {
                                console.log(`🔄 Address updated for: ${job.name}`);
                                job.address = sheetData.address;
                                job.lat = null;
                                job.lng = null;
                            }
                        });

                        // Add new jobs (names in sheet but not yet in items.job)
                        const existingNames = new Set(items.job.map(j => j.name.toLowerCase()));
                        let addedCount = 0;
                        const newJobs = [];

                        for (const [nameLower, data] of sheetJobs) {
                            if (!existingNames.has(nameLower)) {
                                const newJob = {
                                    id: 'job_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                                    name: data.name,
                                    address: data.address,
                                    details: '',
                                    date: '',
                                    status: 'scheduled',
                                    assignedCrews: [],
                                    assignedTrucks: [],
                                    lat: null,
                                    lng: null
                                };
                                items.job.push(newJob);
                                newJobs.push(newJob);
                                addedCount++;
                                console.log(`✅ Added: ${data.name} - ${data.address}`);
                            }
                        }

                        this.saveState();
                        this.render();

                        // Geocode all jobs missing coordinates (new + existing without coords)
                        const jobsToGeocode = items.job.filter(j => j.address && !j.lat && !j.lng);

                        // Show alert BEFORE scheduling geocoding — alert() freezes the JS event loop
                        // (including setTimeout timers), so we must dismiss it first to avoid
                        // all geocode requests firing at once and hitting Nominatim's rate limit.
                        const message = `Sync complete!\n\n✅ Added: ${addedCount} jobs\n🗑️ Removed: ${removedCount} jobs\n\n${jobsToGeocode.length > 0 ? `Placing ${jobsToGeocode.length} job location(s) on the map...` : 'All jobs already pinned.'}`;
                        alert(message);
                        console.log('%c' + message.replace(/\n/g, ' '), 'color: #10b981; font-weight: bold;');

                        if (jobsToGeocode.length > 0) {
                            console.log(`%c🗺️ Geocoding ${jobsToGeocode.length} job address(es)...`, 'color: #4A90E2; font-weight: bold;');

                            jobsToGeocode.forEach((job, index) => {
                                setTimeout(() => {
                                    this.geocodeAddress(
                                        job.address,
                                        (lat, lng) => {
                                            job.lat = lat;
                                            job.lng = lng;
                                            this.saveState();
                                            this.renderMap();
                                            console.log(`📍 Geocoded: ${job.name}`);
                                        },
                                        (error) => {
                                            console.warn(`⚠️ Could not geocode: ${job.name} - "${job.address}"`);
                                        }
                                    );
                                }, index * 1500); // 1.5 second delay between requests
                            });
                        }

                    } catch (error) {
                        console.error('Sync error:', error);
                        alert(`Error syncing from Google Sheet:\n\n${error.message}\n\nMake sure the sheet is:\n1. Shared with "Anyone with the link"\n2. Or published to the web (File > Share > Publish to web)`);
                    }
                },

                parseCSV: function(csvText) {
                    const rows = [];
                    let currentRow = [];
                    let currentField = '';
                    let inQuotes = false;

                    for (let i = 0; i < csvText.length; i++) {
                        const char = csvText[i];
                        const nextChar = csvText[i + 1];

                        if (inQuotes) {
                            if (char === '"' && nextChar === '"') {
                                currentField += '"';
                                i++; // Skip next quote
                            } else if (char === '"') {
                                inQuotes = false;
                            } else {
                                currentField += char;
                            }
                        } else {
                            if (char === '"') {
                                inQuotes = true;
                            } else if (char === ',') {
                                currentRow.push(currentField);
                                currentField = '';
                            } else if (char === '\n' || (char === '\r' && nextChar === '\n')) {
                                currentRow.push(currentField);
                                rows.push(currentRow);
                                currentRow = [];
                                currentField = '';
                                if (char === '\r') i++; // Skip \n in \r\n
                            } else if (char !== '\r') {
                                currentField += char;
                            }
                        }
                    }

                    // Add last field and row if any
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField);
                        rows.push(currentRow);
                    }

                    return rows;
                },

                exportData: function() {
                    const data = {
                        items: items,
                        exportDate: new Date().toISOString()
                    };

                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `crew-battle-map-${Date.now()}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                },

                importData: function() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const data = JSON.parse(event.target.result);

                                // Validate imported data structure
                                const validTypes = ['job', 'vendor', 'crew', 'truck', 'equipment'];
                                if (!data.items || typeof data.items !== 'object') {
                                    alert('Invalid file: missing "items" object.');
                                    return;
                                }
                                for (const t of validTypes) {
                                    if (data.items[t] !== undefined && !Array.isArray(data.items[t])) {
                                        alert(`Invalid file: "${t}" must be an array.`);
                                        return;
                                    }
                                }

                                if (confirm('This will replace all current data. Continue?')) {
                                    const safeItems = {};
                                    validTypes.forEach(t => { safeItems[t] = Array.isArray(data.items[t]) ? data.items[t] : []; });
                                    items = safeItems;
                                    this.saveState();
                                    this.render();
                                    alert('Data imported successfully!');
                                }
                            } catch (e) {
                                alert('Error importing data: ' + e.message);
                            }
                        };
                        reader.readAsText(file);
                    };
                    input.click();
                },

                clearAll: function() {
                    if (!confirm('Clear ALL data including items and map? This cannot be undone!')) return;

                    items = { job: [], vendor: [], crew: [], truck: [], equipment: [] };
                    localStorage.removeItem(STORAGE_KEY);
                    this.render();
                },

                updateStats: function() {
                    // Count items with locations on map
                    const jobsOnMap = items.job.filter(j => j.lat && j.lng).length;
                    const vendorsOnMap = items.vendor.filter(v => v.lat && v.lng).length;

                    document.getElementById('vendorMapCount').textContent = vendorsOnMap;
                    document.getElementById('crewMapCount').textContent = items.crew.length;
                    document.getElementById('truckMapCount').textContent = items.truck.length;
                    document.getElementById('equipmentMapCount').textContent = items.equipment.length;
                },

                searchLocation: function() {

                selectItem: function(type, id, event) {
                    if (event && event.target.closest('.cbm-icon-btn')) {
                        return; // Don't select if clicking action buttons
                    }

                    const item = items[type].find(i => i.id === id);
                    if (!item) return;

                    // For jobs/vendors without locations on mobile, enable placement mode
                    if (isMobile && (type === 'job' || type === 'vendor') && !item.lat && !item.lng) {
                        selectedItem = { type, id };
                        this.updateMobileHelper(true);
                        this.render();
                        return;
                    }

                    // Otherwise show info panel
                    selectedItemInfo = { type, id, item };

                    // For jobs/vendors with locations, pan to them on map
                    if ((type === 'job' || type === 'vendor') && item.lat && item.lng) {
                        map.setView([item.lat, item.lng], 15);
                        if (markers[id]) {

                clearSelection: function() {

                // -------------------------------------------------------
                // Find Closest Crew — ETA Panel
                // -------------------------------------------------------

                populateEtaJobDropdown: function() {
                    const sel = document.getElementById('etaJobSelect');
                    if (!sel) return;
                    let html = '<option value="">— pick a job to auto-fill address —</option>';
                    items.job.forEach(j => {
                        if (j.name) {
                            html += `<option value="${this.escapeAttr(j.id)}">${this.escapeHtml(j.name)}${j.address ? ' — ' + this.escapeHtml(j.address) : ''}</option>`;
                        }
                    });
                    sel.innerHTML = html;

                    // Restore saved GAS URL
                    const gasInput = document.getElementById('chessmapGasUrlInput');
                    if (gasInput) gasInput.value = localStorage.getItem('chessmapGasUrl') || '';
                },

                etaFillAddress: function() {
                    const sel = document.getElementById('etaJobSelect');
                    const addrInput = document.getElementById('etaAddressInput');
                    if (!sel || !addrInput) return;
                    const job = items.job.find(j => j.id === sel.value);
                    if (job && job.address) addrInput.value = job.address;
                },

                findClosestCrew: function() {
                    this.populateEtaJobDropdown();
                    const address = (document.getElementById('etaAddressInput')?.value || '').trim();
                    const resultsDiv = document.getElementById('etaResults');

                    if (!address) {
                        resultsDiv.innerHTML = '<div style="color:var(--cbm-danger);font-size:12px;margin-top:6px;">Enter or pick a job address first.</div>';
                        return;
                    }

                    const placedCrews = items.crew.filter(c => c.lat != null && c.lng != null);
                    if (placedCrews.length === 0) {
                        resultsDiv.innerHTML = '<div style="color:var(--cbm-text-light);font-size:12px;margin-top:6px;">No crews placed on map yet — drag crew markers onto the map first.</div>';
                        return;
                    }

                    const gasUrl = localStorage.getItem('chessmapGasUrl') || '';

                    if (gasUrl && this.isValidGasUrl(gasUrl)) {
                        resultsDiv.innerHTML = '<div style="color:var(--cbm-text-light);font-size:12px;margin-top:6px;">Getting drive times…</div>';
                        const crewLocations = placedCrews.map(c => ({ name: c.name, lat: c.lat, lng: c.lng }));

                        fetch(gasUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'getDriveTimes', newJobAddress: address, crewLocations: crewLocations })
                        })
                        .then(r => r.json())
                        .then(data => {
                            if (data.results && Array.isArray(data.results)) {
                                this.renderEtaResults(data.results, false);
                            } else {
                                throw new Error('Unexpected response');
                            }
                        })
                        .catch(err => {
                            console.warn('GAS drive time error, falling back to Haversine:', err);
                            this.etaHaversine(address, placedCrews);
                        });
                    } else {
                        this.etaHaversine(address, placedCrews);
                    }
                },

                etaHaversine: function(address, placedCrews) {
                    const resultsDiv = document.getElementById('etaResults');
                    resultsDiv.innerHTML = '<div style="color:var(--cbm-text-light);font-size:12px;margin-top:6px;">Geocoding address…</div>';

                    this.geocodeAddress(address, (jobLat, jobLng) => {
                        const results = placedCrews.map(c => {
                            const km = haversineKm(c.lat, c.lng, jobLat, jobLng);
                            return { name: c.name, distance: (km * 0.621371).toFixed(1) + ' mi', distanceVal: km };
                        }).sort((a, b) => a.distanceVal - b.distanceVal);

                        this.renderEtaResults(results, true);
                    }, err => {
                        resultsDiv.innerHTML = '<div style="color:var(--cbm-danger);font-size:12px;margin-top:6px;">Could not geocode address. Try a more specific address.</div>';
                    });
                },

                renderEtaResults: function(results, isApprox) {
                    const medals = ['🥇', '🥈', '🥉'];
                    const approxNote = isApprox ? ' <span style="font-size:10px;opacity:0.55;">(straight-line est.)</span>' : '';
                    let html = `<div style="font-size:10px;color:var(--cbm-text-light);text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;">Ranking${approxNote}</div>`;

                    results.forEach((r, i) => {
                        const medal = medals[i] || (i + 1) + '.';
                        const time = r.driveTime || r.distance || '—';
                        html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:4px;background:var(--cbm-surface2);border-radius:6px;font-size:13px;">
                            <span style="font-size:15px;">${medal}</span>
                            <span style="flex:1;color:var(--cbm-text);">${this.escapeHtml(r.name)}</span>
                            <span style="color:var(--cbm-crew);font-weight:600;font-family:'DM Mono',monospace;">${this.escapeHtml(String(time))}</span>
                        </div>`;
                    });

                    document.getElementById('etaResults').innerHTML = html;
                },

                isValidGasUrl: function(url) {
                    if (!url) return false;
                    try {
                        const parsed = new URL(url);
                        return parsed.protocol === 'https:' && /^script\.google\.com$/i.test(parsed.hostname);
                    } catch (e) { return false; }
                },

                saveGasUrl: function(value) {
                    const v = value.trim();
                    if (!v) { localStorage.removeItem('chessmapGasUrl'); return; }
                    if (this.isValidGasUrl(v)) {
                        localStorage.setItem('chessmapGasUrl', v);
                    }
                },

                escapeHtml: function(text) {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                },

                escapeAttr: function(text) {
                    return String(text).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                },

                escapeJsStr: function(text) {
                    return String(text).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/</g,'\\x3C').replace(/>/g,'\\x3E');
                }
            };

            // Initialize
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => CrewBattleMap.init());
            } else {
                CrewBattleMap.init();
            }

            // -------------------------------------------------------
            // Haversine straight-line distance helper (km)
            // -------------------------------------------------------
            function haversineKm(lat1, lng1, lat2, lng2) {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLng / 2) * Math.sin(dLng / 2);
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            // Expose to global
            window.CrewBattleMap = CrewBattleMap;

        })(window);
    </script>
